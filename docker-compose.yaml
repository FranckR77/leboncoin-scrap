services:
  api:
    build: .
    container_name: lbc_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure
    networks:
      - lbc_net

  mysql:
    image: mysql:8
    container_name: lbc_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: lbc
      MYSQL_USER: lbc_user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - lbc_net

networks:
  lbc_net:

volumes:
  mysql_data:
