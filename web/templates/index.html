{% extends "base.html" %}

{% block title %}Dashboard — Immo Scraper{% endblock %}

{% block content %}
<section>
    <h2>Actions</h2>
    <div class="actions">
        <button id="scrap-btn">Lancer le scrap</button>
        <button id="status-btn">Vérifier le statut</button>
        <button id="pipeline-btn">Pipeline complet</button>
        <span id="message"></span>
    </div>
</section>

<section>
    <h2>Filtres</h2>
    <form id="filter-form">
        <label>
            Ville :
            <input type="text" id="city" name="city" placeholder="ex: Nîmes">
        </label>
        <label>
            Prix min :
            <input type="number" id="min_price" name="min_price" min="0">
        </label>
        <label>
            Prix max :
            <input type="number" id="max_price" name="max_price" min="0">
        </label>

        <label>
            <input type="checkbox" id="suspicious_only" name="suspicious_only">
            Annonces suspectes uniquement
        </label>

        <label>
            <input type="checkbox" id="order_by_score" name="order_by_score">
            Trier par score décroissant
        </label>

        <button type="submit">Appliquer les filtres</button>
        <button type="button" id="reset-btn">Réinitialiser</button>
    </form>
</section>

<section>
    <h2>Annonces</h2>
    <div id="ads"></div>
    <div id="pagination" class="pagination"></div>
</section>

{% endblock %}

{% block scripts %}
<script>
    const messageEl = document.getElementById('message');
    const adsContainer = document.getElementById('ads');
    
    document.getElementById('pipeline-btn').onclick = async () => {
        messageEl.textContent = "Pipeline en cours…";

        try {
            const res = await fetch('/pipeline', { method: 'POST' });
            const data = await res.json();

            if (!res.ok) {
                messageEl.textContent = data.detail || "Erreur lors du pipeline.";
                return;
            }

            messageEl.textContent = "Pipeline terminé ✔";
            console.log("Staging :", data.staging_file);
            console.log("Clean :", data.clean_file);
            console.log("Rapport qualité :", data.quality_report);

        } catch (err) {
            console.error(err);
            messageEl.textContent = "Erreur lors du pipeline.";
        }
    };

    async function addToFavorites(ad_id) {
        const res = await fetch(`/favorites/${ad_id}`, {method: "POST"});
        const data = await res.json();
        alert(data.message);
        loadAds(); // rafraîchir l'affichage
    }

    async function removeFavorite(ad_id) {
        const res = await fetch(`/favorites/${ad_id}`, {method: "DELETE"});
        const data = await res.json();
        alert(data.message);
        loadAds(); // rafraîchir l'affichage
    }

    async function loadAds(filters = {}, page = 1) {
        filters.page = page;  // on injecte la page dans les paramètres

        const params = new URLSearchParams(filters).toString();
        const res = await fetch(`/ads?${params}`);
        const data = await res.json();

        renderAds(data.ads);
        renderPagination(data, filters);
    }

    function renderPagination(data, filters = {}) {
        const paginationEl = document.getElementById('pagination');
        paginationEl.innerHTML = '';

        const current = data.page;
        const total = data.total_pages;

        if (total <= 1) return;

        // Bouton Précédent
        if (current > 1) {
            const prevBtn = document.createElement('button');
            prevBtn.textContent = "❮";
            prevBtn.onclick = () => loadAds(filters, current - 1);
            paginationEl.appendChild(prevBtn);
        }

        // Si page > 2, afficher "..."
        if (current > 2) {
            const firstBtn = document.createElement('button');
            firstBtn.textContent = "1";
            firstBtn.onclick = () => loadAds(filters, 1);
            paginationEl.appendChild(firstBtn);

            const dots = document.createElement('span');
            dots.textContent = "...";
            paginationEl.appendChild(dots);
        }

        // Page active - 1
        if (current > 1) {
            const prevPage = document.createElement('button');
            prevPage.textContent = current - 1;
            prevPage.onclick = () => loadAds(filters, current - 1);
            paginationEl.appendChild(prevPage);
        }

        // Page active
        const currentBtn = document.createElement('button');
        currentBtn.textContent = current;
        currentBtn.classList.add("active");
        paginationEl.appendChild(currentBtn);

        // Page active + 1
        if (current < total) {
            const nextPage = document.createElement('button');
            nextPage.textContent = current + 1;
            nextPage.onclick = () => loadAds(filters, current + 1);
            paginationEl.appendChild(nextPage);
        }

        // "..." avant la dernière page
        if (current < total - 1) {
            const dots = document.createElement('span');
            dots.textContent = "...";
            paginationEl.appendChild(dots);

            const lastBtn = document.createElement('button');
            lastBtn.textContent = total;
            lastBtn.onclick = () => loadAds(filters, total);
            paginationEl.appendChild(lastBtn);
        }

        // Bouton Suivant
        if (current < total) {
            const nextBtn = document.createElement('button');
            nextBtn.textContent = "❯";
            nextBtn.onclick = () => loadAds(filters, current + 1);
            paginationEl.appendChild(nextBtn);
        }
    }

    function renderAds(ads) {
        adsContainer.innerHTML = '';
        if (!ads || ads.length === 0) {
            adsContainer.innerHTML = '<p>Aucune annonce trouvée.</p>';
            return;
        }

        for (const ad of ads) {
            const div = document.createElement('div');
            div.className = 'ad-card';

            const suspiciousBadge = ad.suspicious
                    ? `<span class="badge badge-suspicious">Suspect</span>`
                    : '';

            const scoreDisplay = (ad.score !== undefined && ad.score !== null)
                    ? `<small>Score : ${ad.score}/5</small><br>`
                    : '';

        const favButton = ad.is_favorite
            ? `<button class="fav-btn remove" onclick="removeFavorite(${ad.id})">Retirer des favoris</button>`
            : `<button class="fav-btn add" onclick="addToFavorites(${ad.id})">Ajouter aux favoris</button>`;

        div.innerHTML = `
        <div>
            <strong>${ad.title}</strong><br>
            ${ad.price ? `${ad.price} €` : 'Prix non communiqué'}<br>
            ${ad.surface ? `${ad.surface}` : 'Surface NC'}<br>
            ${ad.city} - ${ad.zipcode}<br>
            <small>${ad.category} / ${ad.type}</small><br>
            <a href="${ad.url}" target="_blank">Voir l'annonce</a><br>
        </div>
        <div>
            ${favButton}<br>
            ${ad.image_url ? `<img src="${ad.image_url}" class="ad-image">` : ''}
        </div>
        `;
        adsContainer.appendChild(div);
        }
        }

        let scrapInterval = null;

        document.getElementById('scrap-btn').onclick = async () => {
            messageEl.textContent = 'Scraping démarré...';

            try {
            const res = await fetch('/scrap', {method: 'POST'});
            const data = await res.json();

            if (!res.ok) {
            messageEl.textContent = data.detail || 'Une erreur est survenue.';
            return;
        }

            messageEl.textContent = "Scraping en cours…";

            // 🔥 Vérification du statut toutes les 1s
            scrapInterval = setInterval(async () => {
            const statusRes = await fetch('/scrap/status');
            const statusData = await statusRes.json();

            if (!statusData.scraping) {
            // ✔ Scrap terminé
            clearInterval(scrapInterval);
            scrapInterval = null;

            messageEl.textContent = "Scraping terminé, mise à jour…";

            await loadAds(); // 🔥 Recharge automatique des annonces

            messageEl.textContent = "Annonces mises à jour ✔";
        }
        }, 1000);

        } catch (err) {
            console.error(err);
            messageEl.textContent = 'Erreur lors du lancement du scrap.';
        }
        };

        document.getElementById('status-btn').onclick = async () => {
            try {
            const res = await fetch('/scrap/status');
            const data = await res.json();
            messageEl.textContent = data.scraping
            ? 'Scraping en cours...'
            : 'Aucun scraping en cours.';
        } catch {
            messageEl.textContent = 'Erreur lors de la récupération du statut.';
        }
        };

        document.getElementById('filter-form').onsubmit = (e) => {
            e.preventDefault();

            const filters = {
            city: document.getElementById('city').value.trim(),
            min_price: document.getElementById('min_price').value,
            max_price: document.getElementById('max_price').value,
        };

            const suspiciousCheckbox = document.getElementById('suspicious_only');
            const orderScoreCheckbox = document.getElementById('order_by_score');

            if (suspiciousCheckbox.checked) {
            filters.suspicious_only = true;
        }
            if (orderScoreCheckbox.checked) {
            filters.order_by_score = true;
        }

            loadAds(filters);
        };

        document.getElementById('reset-btn').onclick = () => {
            document.getElementById('filter-form').reset();
            loadAds();
        };

        // Chargement initial
        loadAds();
</script>
{% endblock %}
```
