<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Immo Scraper Premium{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ============================
       PREMIUM DESIGN TOKENS
    ============================ */
    :root {
        --primary: #ffffff;
        --secondary: #2563eb;       /* Modern blue */
        --secondary-hover: #1d4ed8;
        --accent: #f59e0b;          /* Soft orange/gold */
        --text-main: #111827;
        --text-muted: #6b7280;
        --bg-main: #f3f4f6;
        --bg-surface: #ffffff;
        --border-color: #e5e7eb;
        
        --radius: 12px;
        --radius-lg: 16px;
        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
        --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @media (prefers-color-scheme: dark) {
        :root {
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --bg-main: #111827;
            --bg-surface: #1f2937;
            --border-color: #374151;
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
    }

    /* ============================
       STATIC BASE
    ============================ */
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        background-color: var(--bg-main);
        color: var(--text-main);
        font-family: 'Outfit', sans-serif;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
    }

    a {
        color: var(--secondary);
        text-decoration: none;
        transition: var(--transition);
    }
    
    a:hover {
        color: var(--secondary-hover);
    }

    /* ============================
       LAYOUT & NAVBAR
    ============================ */
    .navbar {
        background: var(--bg-surface);
        padding: 1.2rem 2.5rem;
        box-shadow: var(--shadow-sm);
        position: sticky;
        top: 0;
        z-index: 100;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--border-color);
    }

    .navbar-brand {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--secondary);
        letter-spacing: -0.5px;
    }
    
    .navbar-brand span {
        color: var(--text-main);
    }

    main {
        max-width: 1050px;
        margin: 2.5rem auto;
        padding: 0 1.5rem;
    }

    /* ============================
       TYPOGRAPHY & SECTIONS
    ============================ */
    h2 {
        font-size: 1.6rem;
        font-weight: 600;
        margin-bottom: 1.2rem;
        color: var(--text-main);
        letter-spacing: -0.5px;
    }

    section {
        background: var(--bg-surface);
        border-radius: var(--radius-lg);
        padding: 2rem;
        box-shadow: var(--shadow-md);
        margin-bottom: 2rem;
        border: 1px solid var(--border-color);
        transition: var(--transition);
    }

    /* ============================
       BUTTONS & INPUTS
    ============================ */
    .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: var(--secondary);
        color: white;
        padding: 0.75rem 1.5rem;
        border-radius: var(--radius);
        font-weight: 500;
        font-size: 0.95rem;
        border: none;
        cursor: pointer;
        transition: var(--transition);
        box-shadow: var(--shadow-sm);
    }

    .btn:hover {
        background: var(--secondary-hover);
        transform: translateY(-1px);
        box-shadow: var(--shadow-md);
    }

    .btn-outline {
        background: transparent;
        color: var(--text-main);
        border: 1px solid var(--border-color);
        box-shadow: none;
    }

    .btn-outline:hover {
        background: var(--bg-main);
        border-color: var(--text-muted);
    }

    .btn-success { background: #10b981; }
    .btn-success:hover { background: #059669; }

    .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none !important;
        box-shadow: none !important;
        background: var(--bg-main) !important;
        color: var(--text-muted) !important;
        border-color: var(--border-color) !important;
    }

    input[type="text"], input[type="number"], select {
        width: 100%;
        padding: 0.75rem 1rem;
        border-radius: var(--radius);
        border: 1px solid var(--border-color);
        background: var(--bg-main);
        color: var(--text-main);
        font-family: inherit;
        font-size: 0.95rem;
        transition: var(--transition);
    }

    input:focus, select:focus {
        outline: none;
        border-color: var(--secondary);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        background: var(--bg-surface);
    }

    /* ============================
       CARDS & GRID
    ============================ */
    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 1.5rem;
    }

    .card {
        background: var(--bg-surface);
        border-radius: var(--radius-lg);
        border: 1px solid var(--border-color);
        overflow: hidden;
        transition: var(--transition);
        display: flex;
        flex-direction: column;
    }

    .card:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow-lg);
        border-color: var(--secondary);
    }

    .card-img-wrapper {
        position: relative;
        height: 180px;
        background: var(--bg-main);
        overflow: hidden;
    }

    .card-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.5s ease;
    }

    .card:hover .card-img {
        transform: scale(1.05);
    }
    
    .card-content {
        padding: 1.25rem;
        display: flex;
        flex-direction: column;
        flex-grow: 1;
    }

    .card-title {
        font-weight: 600;
        font-size: 1.1rem;
        margin-bottom: 0.5rem;
        line-height: 1.3;
        color: var(--text-main);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;  
        overflow: hidden;
    }

    .card-price {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--secondary);
        margin-bottom: 0.5rem;
    }

    .card-meta {
        font-size: 0.85rem;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 1rem;
    }

    .card-footer {
        margin-top: auto;
        padding-top: 1rem;
        border-top: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .badge {
        padding: 0.35rem 0.65rem;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        display: inline-block;
    }
    
    .badge-error { background: #fee2e2; color: #b91c1c; }
    .badge-info { background: #dbeafe; color: #1d4ed8; }

    /* ============================
       FORM GRIDS
    ============================ */
    .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 1.2rem;
        align-items: end;
    }
    
    .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
    }
    
    .form-group label {
        font-size: 0.85rem;
        font-weight: 500;
        color: var(--text-muted);
    }
    
    .checkbox-group {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.9rem;
        color: var(--text-main);
        cursor: pointer;
    }

    /* ============================
       FOOTER
    ============================ */
    footer {
        text-align: center;
        padding: 3rem 1.5rem;
        color: var(--text-muted);
        border-top: 1px solid var(--border-color);
        margin-top: 4rem;
        font-size: 0.9rem;
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

<nav class="navbar">
    <div class="navbar-brand">LBC <span>Analytics</span></div>
</nav>

<main>
    {% block content %}{% endblock %}
</main>

<footer>
    <p>&copy; 2026 Immo Scraper Analytics.</p>
    <div style="margin-top: 0.5rem; font-size: 0.8rem;">
        <a href="/legal/cgu">Conditions d'utilisation</a> | 
        <a href="/legal/privacy">Politique de confidentialité</a>
    </div>
</footer>

{% block scripts %}{% endblock %}
</body>
</html>
